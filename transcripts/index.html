(function() {
  const btn = document.getElementById('dark-btn');
  const sys = window.matchMedia('(prefers-color-scheme: dark)');
  function apply() {
    const stored = localStorage.getItem('dark');
    const on = stored !== null ? stored === '1' : sys.matches;
    document.documentElement.classList.toggle('dark', on);
    btn.textContent = on ? '日间' : '夜间';
    btn.classList.toggle('active', on);
    btn.title = stored !== null ? '双击重置为跟随系统' : '跟随系统';
  }

  });

})();

const TAG_COLORS = {"Trading and Research": "#4a6fa5", "Performance": "#c05800", "Systems Design": "#2d6a4f", "Programming Languages": "#6b4c9a", "Hardware": "#8b5e3c", "Machine Learning": "#1d6986", "Ways of Working": "#5a6a5a", "UI/UX": "#c06090", "Build Systems": "#5c6bc0", "Networking": "#2d6a4f", "OCaml": "#b05000", "Compilers": "#6b4c9a"};
const episodes = [{"slug": "building-a-data-warehouse-from-scratch", "title": "Building a Data Warehouse from Scratch with Jacob Baskin", "guest": "Jacob Baskin", "ep_num": "28", "date": "June 24th, 2026", "tags": ["Systems Design", "Performance", "Machine Learning"], "abstract": "In university Jacob Baskin studied at the intersection of computer science and economics,\nthinking about systems that incentivize people to express their true preferences. He put\nthose ideas into practice at Google, where he worked on ad serving, before joining Jane\nStreet’s database infrastructure team. In this episode, Ron and Jacob discuss Superstore,\na distributed columnar database now central to Jane Street’s tech stack that Jacob began\nbuilding practically the day he started. How do you support wide-ranging analytical\nqueries while transactional writes stream in at the speed of trading systems? And what’s\nit like when your first design doc leads to an eight-figure hardware purchase? After\nbuilding Superstore Jacob has since gone back to his roots, thinking about schemes for\nbidding on compute time as he works to optimize usage of the Hive, Jane Street’s massive\ncompute cluster for research.", "has_html": true}, {"slug": "the-network-as-a-program", "title": "The Network as a Program with Nate Foster", "guest": "Nate Foster", "ep_num": "27", "date": "June 1st, 2026", "tags": ["Hardware", "Programming Languages", "Systems Design"], "abstract": "Nate Foster is a professor at EPFL in Switzerland in the Networked Systems Abstractions\nLab, and a visiting researcher at Jane Street on the Networking team. In this episode, he\nand Ron consider what happens when you bring a software mindset to network\nengineering. Can you use programming language theory and formal methods to realize the\ndream of software-defined networks? Along the way, they discuss how hyperscalers have\nshaped networking hardware; the return (or not) of multicast; the ways ML workloads are\nreshaping the networking layer; and the success Jane Street has had using a foundational\nInternet protocol, BGP, together with a more declarative high-level specification\nlanguage.", "has_html": true}, {"slug": "why-testing-is-hard-and-how-to-fix-it", "title": "Why Testing is Hard and How to Fix it with Will Wilson", "guest": "Will Wilson", "ep_num": "26", "date": "March 16th, 2026", "tags": ["Ways of Working", "Systems Design"], "abstract": "Will Wilson is the founder and CEO of Antithesis, which is trying to change how people\ntest software. The idea is that you run your application inside a special hypervisor\nenvironment that intelligently (and deterministically) explores the program’s state space,\nallowing you to pinpoint and replay the events leading to crashes, bugs, and violations of\ninvariants. In this episode, he and Ron take a broad view of testing, considering not just\n“the unreasonable effectiveness of example-based tests” but also property-based testing,\nfuzzing, chaos testing, type systems, and formal methods. How do you blend these\ntechniques to find the subtle, show-stopper bugs that will otherwise wake you up at 3am?\nAs Will has discovered, making testing less painful is actually a tour of some of computer\nscience’s most vexing and interesting problems.", "has_html": true}, {"slug": "why-ml-needs-a-new-programming-language", "title": "Why ML Needs a New Programming Language with Chris Lattner", "guest": "Chris Lattner", "ep_num": "25", "date": "September 3rd, 2025", "tags": ["Machine Learning", "Programming Languages"], "abstract": "Chris Lattner is the creator of LLVM and led the development of the Swift language at\nApple. With Mojo, he’s taking another big swing: How do you make the process of getting\nthe full power out of modern GPUs productive and fun? In this episode, Ron and Chris\ndiscuss how to design a language that’s easy to use while still providing the level of\ncontrol required to write state of the art kernels. A key idea is to ask programmers to\nfully reckon with the details of the hardware, but making that work manageable and\nshareable via a form of type-safe metaprogramming. The aim is to support both\nspecialization to the computation in question as well as to the hardware platform.\n“Somebody has to do this work,” Chris says, “if we ever want to get to an ecosystem where\none vendor doesn’t control everything.”", "has_html": true}, {"slug": "the-thermodynamics-of-trading", "title": "The Thermodynamics of Trading with Daniel Pontecorvo", "guest": "Daniel Pontecorvo", "ep_num": "24", "date": "July 25th, 2025", "tags": ["Ways of Working", "Hardware"], "abstract": "Daniel Pontecorvo runs the “physical engineering” team at Jane Street. This group blends\narchitecture, mechanical engineering, electrical engineering, and construction management\nto build functional physical spaces. In this episode, Ron and Dan go deep on the challenge\nof heat exchange in a datacenter, especially in the face of increasingly dense power\ndemands—and the analogous problem of keeping traders cool at their desks. Along the way\nthey discuss the way ML is changing the physical constraints of computing; the benefits of\nhaving physical engineering expertise in-house; the importance of monitoring; and whether\nyou really need Apollo-style CO2 scrubbers to ensure your office gets fresh air.", "has_html": true}, {"slug": "building-tools-for-traders", "title": "Building Tools for Traders with Ian Henry", "guest": "Ian Henry", "ep_num": "23", "date": "May 28th, 2025", "tags": ["Programming Languages", "Trading and Research", "UI/UX"], "abstract": "Ian Henry started his career at Warby Parker and Trello, building consumer apps for\nmillions of users. Now he writes high-performance tools for a small set of experts on Jane\nStreet’s options desk. In this episode, Ron and Ian explore what it’s like writing code at\na company that has been “on its own parallel universe software adventure for the last\ntwenty years.” Along the way, they go on a tour of Ian’s whimsical and sophisticated side\nprojects—like Bauble, a playground for rendering trippy 3D shapes using signed distance\nfunctions—that have gone on to inform his work: writing typesafe frontend code for users\nwho measure time in microseconds and prefer their UIs to be “six pixels high.”", "has_html": true}, {"slug": "finding-signal-in-the-noise", "title": "Finding Signal in the Noise: Machine Learning and the Markets with In Young Cho", "guest": "In Young Cho", "ep_num": "22", "date": "March 10th, 2025", "tags": ["Machine Learning", "Trading and Research"], "abstract": "In Young Cho thought she was going to be a doctor but fell into a trading internship at\nJane Street. Now she helps lead the research group’s efforts in machine learning. In this\nepisode, In Young and Ron touch on the porous boundaries between trading, research, and\nsoftware engineering, which require different sensibilities but are often blended in a\nsingle person. They discuss the tension between flexible research tools and robust\nproduction systems; the challenges of ML in a low-data, high-noise environment subject to\nfrequent regime changes; and the shift from simple linear models to deep neural networks.", "has_html": true}, {"slug": "the-uncertain-art-of-accelerating-ml-models", "title": "The Uncertain Art of Accelerating ML Models with Sylvain Gugger", "guest": "Sylvain Gugger", "ep_num": "21", "date": "October 14th, 2024", "tags": ["Machine Learning", "Performance"], "abstract": "Sylvain Gugger is a former math teacher who fell into machine learning via a MOOC and\nbecame an expert in the low-level performance details of neural networks. He’s now on the\nML-infra team at Jane Street, where he helps traders speed up their models. In this\nepisode, Sylvain and Ron go deep on learning rate schedules; the subtle performance bugs\nPyTorch lets you write; how to keep a hungry GPU well-fed; and the importance of\nreproducibility in training runs. They also discuss some of the unique challenges of doing\nML in the world of trading, like the unusual size and shape of market data and the need to\ndo inference at very low latencies.", "has_html": true}, {"slug": "solving-puzzles-in-production", "title": "Solving Puzzles in Production with Liora Friedberg", "guest": "Liora Friedberg", "ep_num": "20", "date": "October 7th, 2024", "tags": ["Ways of Working"], "abstract": "Liora Friedberg is a Production Engineer at Jane Street with a background in economics and\ncomputer science. In this episode, Liora and Ron discuss how production engineering blends\nhigh-stakes puzzle solving with thoughtful software engineering, as the people doing\nsupport build tools to make that support less necessary. They also discuss how Jane Street\nuses both tabletop simulation and hands-on exercises to train Production Engineers; what\nskills effective Production Engineers have in common; and how to create a culture where\npeople aren’t blamed for making costly mistakes.", "has_html": true}, {"slug": "from-the-lab-to-the-trading-floor", "title": "From the Lab to the Trading Floor: Designing for Expert Users with Erin Murphy", "guest": "Erin Murphy", "ep_num": "19", "date": "July 10th, 2024", "tags": ["Ways of Working", "UI/UX"], "abstract": "Erin Murphy is a UX designer at Jane Street, and before that, she worked at NASA’s Jet\nPropulsion Laboratory building user interfaces for space missions.  She’s also an\nillustrator with her own quarterly journal. In this episode, Erin and Ron discuss the\nchallenge of doing user-centered design in an organization where experts are used to\nbuilding tools for themselves. How do you bring a command-line interface to the web\nwithout making it worse for power users? They also discuss how beauty in design is more\nabout utility than aesthetics; what Jane Street looks for in UX candidates; and how to\nhelp engineers discover what their users really want.", "has_html": true}, {"slug": "performance-engineering-on-hard-mode", "title": "Performance Engineering on Hard Mode with Andrew Hunter", "guest": "Andrew Hunter", "ep_num": "18", "date": "November 28th, 2023", "tags": ["Performance"], "abstract": "Andrew Hunter likes making code go fast. Before joining Jane Street,\nhe worked for seven years at Google on multithreaded architecture, and\nwas a tech lead for tcmalloc, Google’s world-class scalable malloc\nimplementation. In this episode, Andrew and Ron discuss how,\nparadoxically, in some ways it’s easier to optimize systems at\nhyperscale because of the impact that even miniscule changes can\nhave. Finding performance wins in trading systems, which operate at a\nsmaller scale, but which have bursty, low-latency workloads, is often\ntrickier. Andrew explains how he approaches the problem, including his\nfavorite profiling techniques and visualization tools; the unique\nchallenges of optimizing OCaml versus C++; and when you should and\nshouldn’t care about nanoseconds. They also touch on the joys of\nmusical theater, and how to pass an interview when you’re\nsleep-deprived.", "has_html": true}, {"slug": "a-poets-guide-to-product-management", "title": "A Poet's Guide to Product Management with Peter Bogart-Johnson", "guest": "Peter Bogart-Johnson", "ep_num": "17", "date": "August 14th, 2023", "tags": ["Ways of Working"], "abstract": "Peter Bogart-Johnson was one of Jane Street’s first program managers,\nand helped bring the art of PMing—where that “P” variously stands for\n“project,” “product,” or some blend of the two—to the company at\nlarge. He’s also a poet and the former editor of a literary\nmagazine. In this episode, Peter and Ron discuss the challenge of\ngaining trust as an outsider: how do you teach teams a new way of\ndoing things while preserving what’s already working? The key, Peter\nsays, is you listen; a good PM is an anthropologist. They also discuss\nhow paying down technical debt isn’t something you do instead of\nserving customers; what Jane Street looks for in PM candidates; and\nhow to help teams coordinate in times of great change.", "has_html": true}, {"slug": "future-of-programming", "title": "The Future of Programming with Richard Eisenberg", "guest": "Richard Eisenberg", "ep_num": "16", "date": "May 17th, 2023", "tags": ["Programming Languages"], "abstract": "Richard Eisenberg is one of the core maintainers of Haskell. He\nrecently joined Jane Street’s Tools and Compilers team, where he hacks\non the OCaml compiler. He and Ron discuss the powerful language\nfeature that got him into PL design in the first place—dependent\ntypes—and its role in a world where AIs can (somewhat) competently\nwrite your code for you. They also discuss the differences between\nHaskell and OCaml; the perils of trying to make a language that works\nfor everybody; and how best a company like Jane Street can collaborate\nwith the open source community.", "has_html": true}, {"slug": "swapping-the-engine-out-of-a-moving-race-car", "title": "Swapping the Engine out of a Moving Race Car with Ella Ehrlich", "guest": "Ella Ehrlich", "ep_num": "15", "date": "September 12th, 2022", "tags": ["Systems Design"], "abstract": "Ella Ehrlich has been a developer at Jane Street for close to a\ndecade. During much of that time, she’s worked on Gord, one of Jane\nStreet’s oldest and most critical systems, which is responsible for\nnormalizing and distributing the firm’s trading data. Ella and Ron\ntalk about how to grow and modernize a legacy system without\ncompromising uptime, why game developers are the “musicians of\nsoftware,” and some of the work Jane Street has done to try to hire a\nmore diverse set of software engineers.", "has_html": true}, {"slug": "state-machine-replication-and-why-you-should-care", "title": "State Machine Replication, and Why You Should Care with Doug Patti", "guest": "Doug Patti", "ep_num": "14", "date": "April 20th, 2022", "tags": ["Systems Design"], "abstract": "Doug Patti is a developer in Jane Street’s Client-Facing Tech team,\nwhere he works on a system called Concord that undergirds Jane\nStreet’s client offerings.  In this episode, Doug and Ron discuss how\nConcord, which has state-machine replication as its core abstraction,\nhelps Jane Street achieve the reliability, scalability, and speed that\nthe client business demands.  They’ll also discuss Doug’s involvement\nin building a successor system called Aria, which is designed to deliver\nthose same benefits to a much wider audience.", "has_html": true}, {"slug": "memory-management", "title": "Memory Management with Stephen Dolan", "guest": "Stephen Dolan", "ep_num": "13", "date": "January 5th, 2022", "tags": ["Programming Languages", "Performance"], "abstract": "Stephen Dolan works on Jane Street’s Tools and Compilers team where he\nfocuses on the OCaml compiler. In this episode, Stephen and Ron take a\ntrip down memory lane, discussing how to manage computer memory\nefficiently and safely. They consider trade-offs between reference\ncounting and garbage collection, the surprising gains achieved by\nprefetching, and how new language features like local allocation and\nunboxed types could give OCaml users more control over their memory.", "has_html": true}, {"slug": "what-is-an-operating-system", "title": "What is an Operating System? with Anil Madhavapeddy", "guest": "Anil Madhavapeddy", "ep_num": "12", "date": "November 3rd, 2021", "tags": ["Programming Languages", "Systems Design"], "abstract": "Anil Madhavapeddy is an academic, author, engineer, entrepreneur, and\nOCaml aficionado. In this episode, Anil and Ron consider the evolving\nrole of operating systems, security on the internet, and the pending\narrival (at last!) of OCaml 5.0. They also discuss using Raspberry Pis\nto fight climate change; the programming inspiration found in British\npubs and on Moroccan beaches; and the time Anil went to a party, got\ndrunk, and woke up with a job working on the Mars Polar Lander.", "has_html": true}, {"slug": "building-a-ui-framework", "title": "Building a UI Framework with Ty Overby", "guest": "Ty Overby", "ep_num": "11", "date": "October 6th, 2021", "tags": ["UI/UX", "Systems Design"], "abstract": "Ty Overby is a programmer in Jane Street’s web platform group where he\nworks on Bonsai, our OCaml library for building interactive\nbrowser-based UIs. In this episode, Ty and Ron consider the functional\napproach to building user interfaces. They also discuss Ty’s\nprogramming roots in Neopets, what development features they crave on\nthe web, the unfairly maligned CSS, and why Excel is “arguably the\ngreatest programming language ever developed.”", "has_html": true}, {"slug": "writing-technically", "title": "Writing, Technically with James Somers", "guest": "James Somers", "ep_num": "10", "date": "September 1st, 2021", "tags": ["Ways of Working"], "abstract": "James Somers is Jane Street’s writer-in-residence, splitting his time\nbetween English and OCaml, and helping to push forward all sorts of\nefforts around knowledge-sharing at Jane Street. In this episode,\nJames and Ron talk about the role of technical writing in an\norganization like Jane Street, and how engineering software relates to\nediting prose.", "has_html": true}, {"slug": "an-inside-look-at-jane-streets-tech-internship", "title": "An inside look at Jane Street's tech internship with Jeanne Van Briesen, Matt Else, and Grace Zhang", "guest": "Jeanne Van Briesen, Matt Else, and Grace Zhang", "ep_num": "9", "date": "November 4th, 2020", "tags": ["Ways of Working"], "abstract": "In this week's episode, the season 1 finale, Ron speaks with Jeanne, Matt, and Grace, three former tech interns at Jane Street who have returned as full-timers. They talk about the experience of being an intern at Jane Street, the types of projects that interns work on, and how they've found the transition to full-time work.", "has_html": true}, {"slug": "building-a-functional-email-server", "title": "Building a functional email server with Dominick LoBraico", "guest": "Dominick LoBraico", "ep_num": "8", "date": "October 28th, 2020", "tags": ["Systems Design"], "abstract": "Despite a steady stream of newcomers, email still reigns supreme as the chief communication mechanism for the Information Age. At Jane Street, it’s just as critical as anywhere, but there’s one difference: the system at the heart of our email infrastructure is homegrown. This week, Ron talks to Dominick LoBraico, an engineer working on Jane Street’s technology infrastructure, about how and why we built Mailcore, an email server written and configured in OCaml. They delve into questions around how best to represent the configuration of a complex system, when you should build your own and when you shouldn’t, and the benefits of bringing a code-focused approach to solving systems problems.", "has_html": true}, {"slug": "language-design", "title": "Language Design with Leo White", "guest": "Leo White", "ep_num": "7", "date": "October 21st, 2020", "tags": ["Programming Languages"], "abstract": "Equal parts science and art, programming language design is very much an unsolved problem. This week, Ron speaks with Leo White, from Jane Street's Tools & Compilers team, about cutting-edge language features, future work happening on OCaml, and Jane Street's relationship with the broader open-source community. The conversation covers everything from the paradox of language popularity, to advanced type system features like modular implicits and dependent types. Listen in, no programming languages PhD required!", "has_html": true}, {"slug": "clock-synchronization", "title": "Clock Synchronization with Chris Perl", "guest": "Chris Perl", "ep_num": "6", "date": "October 14th, 2020", "tags": ["Systems Design"], "abstract": "Clock synchronization, keeping all of the clocks on your network set to the “correct” time, sounds straightforward: our smartphones sure don’t seem to have trouble with it. Next, keep them all accurate to within 100 microseconds, and prove that you did -- now things start to get tricky. In this episode, Ron talks with Chris Perl, a systems engineer at Jane Street about the fundamental difficulty of solving this problem at scale and how we solved it.", "has_html": true}, {"slug": "python-ocaml-and-machine-learning", "title": "Python, OCaml, and Machine Learning with Laurent Mazare", "guest": "Laurent Mazare", "ep_num": "5", "date": "October 7th, 2020", "tags": ["Machine Learning", "Programming Languages"], "abstract": "A conversation with Laurent Mazare about how your choice of programming language interacts with the kind of work you do, and in particular about the tradeoffs between Python and OCaml when doing machine learning and data analysis. Ron and Laurent discuss the tradeoffs between working in a text editor and a Jupyter Notebook, the importance of visualization and interactivity, how tools and practices vary between language ecosystems, and how language features like borrow-checking in Rust and ref-counting in Swift and Python can make machine learning easier.", "has_html": true}, {"slug": "compiler-optimization", "title": "Compiler Optimization with Greta Yorsh", "guest": "Greta Yorsh", "ep_num": "4", "date": "September 30th, 2020", "tags": ["Programming Languages", "Performance"], "abstract": "It’s a software engineer’s dream: A compiler that can take idiomatic high-level code and output maximally efficient instructions. Ron’s guest this week is Greta Yorsh, who has worked on just that problem in a career spanning both industry and academia. Ron and Greta talk about some  of the tricks that compilers use to make our software faster, ranging from feedback-directed optimization and super-optimization to formal analysis.", "has_html": true}, {"slug": "multicast-and-the-markets", "title": "Multicast and the Markets with Brian Nigito", "guest": "Brian Nigito", "ep_num": "3", "date": "September 23rd, 2020", "tags": ["Trading and Research", "Performance", "Systems Design"], "abstract": "Electronic exchanges like Nasdaq need to handle a staggering number of transactions every second. To keep up, they rely on two deceptively simple-sounding concepts: single-threaded programs and multicast networking. In this episode, Ron speaks with Brian Nigito, a 20-year industry veteran who helped build some of the earliest electronic exchanges, about the tradeoffs that led to the architecture we have today, and how modern exchanges use these straightforward building blocks to achieve blindingly fast performance at scale.", "has_html": true}, {"slug": "build-systems", "title": "Build Systems with Andrey Mokhov", "guest": "Andrey Mokhov", "ep_num": "2", "date": "September 16th, 2020", "tags": ["Systems Design"], "abstract": "Most software engineers only think about their build system when it breaks; and yet, this often unloved piece of software forms the backbone of every serious project. This week, Ron has a conversation with Andrey Mokhov about build systems, from the venerable Make to Bazel and beyond. Andrey has a lot of experience in this field, including significant contributions to the replacement for the Glasgow Haskell Compiler’s Make-based system and Build Systems à la carte, a paper that untangles the complex ecosystem of existing build systems. Ron and Andrey muse on questions like why every language community seems to have its own purpose-built system and, closer to home, where Andrey and the rest of the build systems team at Jane Street are focusing their efforts.", "has_html": true}, {"slug": "programmable-hardware", "title": "Programmable Hardware with Andy Ray", "guest": "Andy Ray", "ep_num": "1", "date": "September 9th, 2020", "tags": ["Hardware"], "abstract": "The ever-widening availability of FPGAs has opened the door to solving a broad set of performance-critical problems in hardware. In this episode, Ron speaks with Andy Ray, who leads Jane Street’s hardware design team. Andy has a long career prior to Jane Street shipping hardware designs for things like modems and video codecs. That work led him to create Hardcaml, a domain-specific language for expressing hardware designs. Ron and Andy talk about the current state-of-the-art in hardware tooling, the economics of FPGAs, and how the process of designing hardware can be improved by applying lessons from software engineering.", "has_html": true}];

let activeTag = null;

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function tagSpan(t) {
  const c = TAG_COLORS[t] || '#888';
  return `<span class="tag" style="border-color:${c};color:${c}" data-tag="${esc(t)}">${esc(t)}</span>`;
}

function renderCard(ep) {
  const metaParts = [ep.ep_num ? `Episode ${ep.ep_num}` : '', ep.date || ''].filter(Boolean);
  const metaLine = metaParts.join(' &nbsp;&middot;&nbsp; ');
  const tagsHtml = (ep.tags || []).map(tagSpan).join('');
  const titleHtml = ep.has_html
    ? `<a href="${esc(ep.slug)}.html">${esc(ep.title)}</a>`
    : `<span class="no-link">${esc(ep.title)}</span>`;
  return `<div class="card"
    data-title="${esc(ep.title.toLowerCase())}"
    data-abstract="${esc((ep.abstract||'').toLowerCase())}"
    data-tags="${esc((ep.tags||[]).join(' ').toLowerCase())}">
    <div class="card-title">${titleHtml}</div>
    ${metaLine ? `<div class="card-meta">${metaLine}</div>` : ''}
    ${tagsHtml ? `<div class="card-tags">${tagsHtml}</div>` : ''}
    ${ep.abstract ? `<p class="abstract">${esc(ep.abstract)}</p>` : ''}
  </div>`;
}

function applyFilter() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  const cards = document.querySelectorAll('#cards .card');
  let visible = 0;
  cards.forEach(card => {
    const matchQ = !q || card.dataset.title.includes(q)
                      || card.dataset.abstract.includes(q)
                      || card.dataset.tags.includes(q);
    const matchTag = !activeTag || card.dataset.tags.includes(activeTag.toLowerCase());
    const show = matchQ && matchTag;
    card.classList.toggle('hidden', !show);
    if (show) visible++;
  });
  document.getElementById('count').textContent =
    visible === episodes.length ? `${visible} episodes`
    : `${visible} of ${episodes.length} episodes`;
  document.getElementById('no-results').classList.toggle('hidden', visible > 0);
}

(function init() {
  const container = document.getElementById('cards');
  container.innerHTML = episodes.map(renderCard).join('\n');
  document.getElementById('count').textContent = `${episodes.length} episodes`;
  document.getElementById('search').addEventListener('input', applyFilter);
  container.addEventListener('click', e => {
    const tag = e.target.closest('.tag');
    if (!tag) return;
    const t = tag.dataset.tag;
    activeTag = activeTag === t ? null : t;
    document.querySelectorAll('.tag').forEach(el => {
      el.style.opacity = (!activeTag || el.dataset.tag === activeTag) ? '1' : '0.35';
    });
    applyFilter();
  });
})();
</script>
</body>
